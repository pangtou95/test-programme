name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check CLI
        run: npm run cli:help

      - name: Check npm package contents
        run: npm run pack:check
